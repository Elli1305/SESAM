reset.subject=Vervollständigen Sie Ihre Passwort-Reset-Anfrage
reset.text=Sehr geehrte(r) {0} {1},\n\nWir haben eine Anfrage zum Zurücksetzen Ihres Passworts für Ihr Konto in unserem System erhalten. Um das Passwort zurückzusetzen, klicken Sie bitte auf den folgenden Link:\n\nhttp://localhost:8088/update_password?token={2}\n\nWenn Sie das Zurücksetzen des Passworts nicht angefordert haben, ignorieren Sie diese E-Mail bitte. Ihr Konto bleibt sicher.\n\nBitte beachten Sie, dass der Link zum Zurücksetzen des Passworts nur für eine begrenzte Zeit gültig ist. Wenn Sie den Link nicht innerhalb des festgelegten Zeitrahmens verwenden, müssen Sie einen neuen Link zum Zurücksetzen des Passworts anfordern.\n\nFreundliche Grüße,\nTeam 3-1