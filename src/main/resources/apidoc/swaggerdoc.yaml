components:
  schemas:
    Location:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Hamburg
        building:
          type: array
          items:
            $ref: '#/components/schemas/Building'
      xml:
        name: location
    Building:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Citec
        floor:
          type: array
          items:
            $ref: '#/components/schemas/Floor'
      xml:
        name: building
    Floor:
      required:
        - id
        - floor-level
        - floorPlanPath
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        floor-level:
          type: integer
          format: int64
          example: 10
        floorPlanPath:
          type: string
          example: Citec.png
        room:
          type: array
          items:
            $ref: '#/components/schemas/Room'
      xml:
        name: floor
    Room:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        floor-level:
          type: integer
          format: int64
          example: 10
        floorPlanPath:
          type: string
          example: Citec.png
        coordinates:
          type: array
          items:
            $ref: '#/components/schemas/Coordinate'
        door:
          type: array
          items:
            $ref: '#/components/schemas/Door'
      xml:
        name: room
    Door:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        floor-level:
          type: integer
          format: int64
          example: 10
        coordinates:
          type: array
          items:
            $ref: '#/components/schemas/Coordinate'
        proofconfigIn:
          type: array
          items:
            $ref: '#/components/schemas/Proofconfig'
        proofconfigOut:
          type: array
          items:
            $ref: '#/components/schemas/Proofconfig'
      xml:
        name: room
    Coordinate:
      required:
        - id
        - lng
        - lat
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        lng:
          type: number
          example: 10.00
        lat:
          type: number
          example: 10.00
      xml:
        name: coordinate
    RoomGroup:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        floor-level:
          type: string
          example: Office
        room:
          type: array
          items:
            $ref: '#/components/schemas/Room'
        building:
          $ref: '#/components/schemas/Building'
      xml:
        name: roomgroup
    Proofconfig:
      required:
        - id
        - description
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        description:
          type: string
          example: Office
        requestedAttributes:
          type: array
          items:
            $ref: '#/components/schemas/ProofAttributeInfo'
        requestedPredicates:
          type: array
          items:
            $ref: '#/components/schemas/ProofPredicateInfo'
      xml:
        name: proofconfig
    Doorconfig:
      required:
        - description
        - doorId
        - configParts
      type: object
      properties:
        description:
          type: string
          example: Show a credential
        doorId:
          type: integer
          format: int64
          example: 13
        configParts:
          type: array
          items:
            $ref: '#/components/schemas/ConfigParts'
    ConfigParts:
      required:
        - credentials
        - attributeFilter
      type: object
      properties:
        credentials:
          type: array
          items:
            $ref: '#/components/schemas/ExternalCredential'
        configParts:
          type: array
          items:
            $ref: '#/components/schemas/AttributeFilter'
    TwoWayDoorConfig:
      required:
        - doorConfigIn
        - doorConfigOut
      type: object
      properties:
        doorConfigIn:
          $ref: '#/components/schemas/Doorconfig'
        doorConfigOut:
          $ref: '#/components/schemas/Doorconfig'
    Preconfig:
      required:
        - id
        - name
        - twoWayDoorConfig
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 13
        name:
          type: string
          example: U-Member-Config
        twoWayDoorConfig:
          type: array
          items:
            $ref: '#/components/schemas/TwoWayDoorConfig'
    Colors:
      required:
        - id
        - defaultColors
        - theme
        - logoPath
        - bgC
        - textC
        - primaryColor
        - secondary
        - accent
        - dark
        - lightBlue
        - positive
        - negative
        - info
        - warning
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        defaultColors:
          type: boolean
          example: true
        theme:
          type: string
          example: light
        logoPath:
          type: string
          example: Logo.svg
        bgc:
          type: string
          example: blue
        textC:
          type: string
          example: black
        primaryColor:
          type: string
          example: pink
        secondary:
          type: string
          example: light-pink
        accent:
          type: string
          example: yellow
        dark:
          type: string
          example: grey
        lightblue:
          type: string
          example: green
        positive:
          type: string
          example: red
        negative:
          type: string
          example: red
        info:
          type: string
          example: yellow
        warning:
          type: string
          example: white
      xml:
        name: proofconfig
    Category:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Safety
        internalCredentials:
          type: array
          items:
            $ref: '#/components/schemas/InternalCredential'
        externalCredentials:
          type: array
          items:
            $ref: '#/components/schemas/ExternalCredential'
      xml:
        name: category
    ExternalCredential:
      required:
        - id
        - name
        - credentialDefinitionId
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Safety Telekom
        credentialDefintionId:
          type: string
          example: $U-Member
        form:
          type: array
          items:
            $ref: '#/components/schemas/Form'
      xml:
        name: externalcredential
    InternalCredential:
      required:
        - id
        - name
        - credentialDefinitionId
        - agent
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Safety Telekom
        credentialDefintionId:
          type: string
          example: $U-Member
        agent:
          type: string
          example: tlabs
        category:
          $ref: '#/components/schemas/Category'
        form:
          type: array
          items:
            $ref: '#/components/schemas/Form'
        checklist:
          type: array
          items:
            $ref: '#/components/schemas/Checklist'
        issuer:
          type: array
          items:
            $ref: '#/components/schemas/Issuer'
      xml:
        name: internalcredential
    Form:
      required:
        - id
        - label
        - type
        - attributeName
        - validationRules
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        label:
          type: string
          example: "ID"
        type:
          type: string
          example: date
          enum:
            - date
            - number
            - text
        attributeName:
          type: string
          example: id_member
        validationRules:
          type: array
          items:
            $ref: '#/components/schemas/ValidationRules'
      xml:
        name: form
    Checklist:
      required:
        - id
        - label
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        attributeName:
          type: string
          example: Do you wanna give the permission
      xml:
        name: checklist
    IssueCredentialAttributeCmd:
      required:
        - id
        - value
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        value:
          type: string
          example: id = 12
    File:
      type: object
      properties:
        path:
          type: string
          example: Logo.svg
    Imprint:
      required:
        - id
        - content
        - timestamp
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        content:
          type: string
          example: Citec Universitätsstr. 13 33615 Bielefeld
        timestamp:
          type: string
          example: 05-03-2023 15:43
      xml:
        name: imprint
    Mail:
      required:
        - form
        - to
        - subject
        - text
      type: object
      properties:
        form:
          type: string
          example: Gmail
        to:
          type: string
          example: test@test.de
        subject:
          type: string
          example: Password Reset
        text:
          type: string
          example: Password Reset allowed
      xml:
        name: mail
    User:
      required:
        - id
        - email
        - password
        - firstName
        - lastName
        - roles
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        email:
          type: string
          example: admin@test.de
        password:
          type: string
          example: Hallo123!
        firstName:
          type: string
          example: Gerd
        lastName:
          type: string
          example: Meier
        roles:
          type: string
          enum:
            - Editor
            - Admin
            - Issuer
          example: Admin
      xml:
        name: user
    Issuer:
      required:
        - user
        - room
        - credentials
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        room:
          $ref: '#/components/schemas/Room'
        credentials:
          type: array
          items:
            $ref: '#/components/schemas/InternalCredential'
      xml:
        name: issuer
    ValidationRules:
      type: object
      properties:
        rule:
          type: string
          example: "ID"
        type:
          type: string
          example: date
          enum:
            - date
            - number
            - text
    ProofAttributeInfo:
      required:
        - id
        - name
        - restrictions
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        restrictions:
          type: array
          items:
            $ref: '#/components/schemas/AttributeFilter'
      xml:
        name: proofattributeinfo
    AttributeFilter:
      required:
        - id
        - credentialDefintionId
        - attributeValue
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        credentialDefintionId:
          type: string
          example: $U-Member
        attributeValue:
          items:
            $ref: '#/components/schemas/AttributeValue'
      xml:
        name: proofattributeinfo
    AttributeValue:
      required:
        - id
        - name
        - attValue
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        name:
          type: string
          example: id
        attValue:
          type: string
          example: 12
    PasswordResetCmd:
      type: object
      properties:
        email:
          type: string
          example: test@test.de
    UpdatePasswordCmd:
      type: object
      properties:
        token:
          type: string
          example: gfjkmlvfi832910owdef
        password:
          type: string
          example: Hallo123!
    ProofPredicateInfo:
      required:
        - id
        - name
        - predicateType
        - predicateValue
        - restrictions
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        name:
          type: string
          example: number
        predicateType:
          type: string
          example: Date
        predicateValue:
          type: string
          example: 12
        restrictions:
          type: array
          items:
            $ref: '#/components/schemas/AttributeFilter'
      xml:
        name: proofattributeinfo
