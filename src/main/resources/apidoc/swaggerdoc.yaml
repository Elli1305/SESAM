openapi: 3.0.3
info:
  title: Sesam 3.1
  description: |-
    Api documentation for the implementation of SESAM application of Team 3.1
  contact:
    email: lhabich@techfak.uni-bielefeld.de
  license:
    name: MIT
    url: https://se.techfak.de/projects/gp-se-ss-2023-team3-1/wiki/OpenSource_Lizenz
  version: 1.0.0
servers:
  - url: https://localhost:8088
tags:
  - name: location
    description: Everything about the Locations
  - name: building
    description: Everything about the Building
  - name: floor
    description: Everything about the Floor
  - name: room
    description: Everything about the room
  - name: roomgroup
    description: Everything about the roomgroup
  - name: door
    description: Everything about the door
  - name: doorconfig
    description: Everything about the doorconfig
  - name: preconfig
    description: Everything about the predefined configs
  - name: credentials
    description: Everything about the credentials
  - name: category
    description: Everything about the categories
  - name: user
    description: Operations about user
  - name: issuer
    description: Operations about issuer
  - name: colors
    description: Everything about the colors
  - name: imprint
    description: Everything about the imprint
paths:
  /building/save:
    post:
      tags:
        - building
      summary: Save building
      description: Save building
      operationId: save
      requestBody:
        description: Save a building
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Building'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
        '405':
          description: Invalid input
      security:
        - editor_auth:
            - write:buildings
            - read:buildings
  /building/{id}:
    delete:
      tags:
        - building
      summary: Deletes a building
      description: Deletes a building by its id
      operationId: deleteById
      parameters:
        - name: id
          in: path
          description: The id of the building that needs to be deleted
          required: true
          schema:
            type: integer
      responses:
        '400':
          description: Invalid id supplied
        '404':
          description: Building not found
      security:
        - editor_auth:
            - write:buildings
            - read:buildings
  /credentialmapping:
