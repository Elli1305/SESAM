reset.subject=Complete your password reset request
reset.text=Hey {0} {1},\n\nWe have received a password reset request for your account on our system. To proceed with the password reset, please click on the link below:\n\nhttp://localhost:8088/passwordchange?token={2}\n\nIf you did not request a password reset, please ignore this email. Your account will remain secure.\n\nPlease note that the password reset link is only valid for a limited time. If you do not use the link within the designated time frame, you will need to request a new password reset link.\n\nBest regards,\nTeam 3-1
